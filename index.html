			border-color: black;

			top: 40px;

			background-color: #979797;
		}
		#run_js_confirm {
			position: absolute;
			color: blue;
			text-decoration: underline;
			top: 220px;
			left: 20px;
		}
		#confirm_js_copy {
			position: absolute;
			color: blue;
			text-decoration: underline;
			top: 220px;
			left: 280px;
		}
		.region_selection {
			position: absolute;
			border: 1px solid black;
			pointer-events: none;
			box-sizing: border-box;
		}
		.mobile_selection_handle {
			width: 16px;
			height: 16px;
			border-radius: 50%;
			background-color: navy;
			position: absolute;
		}
		#area_results {
			width: 100%;
			height: 200px;
			white-space: pre;
			overflow: auto;
			overflow-x: scroll;
		}
		#link_element {
			position: absolute;

			font-family: verdana;

			vertical-align: top;

		}
		.color_btn:active {
			border-color: rgb(165, 107, 0);

			white-space: nowrap;
		}

			top: 0px;
			left: 0px;

			justify-content: center;
			align-items: center;

		}
		.modal_close {
			position: absolute;
			right: 0px;
			bottom: 0px;
			margin-right: 8px;
			margin-bottom: 8px;
			color: blue;

			cursor: pointer
		}

			background-color: #C3C3FF;
		}
		.modal_client {
			background-color: #E5E5FF;
		}
		.modal-tab-btn {
			background-color: rgb(178 178 231);
		}
		.modal-tab-btn:hover {
			background-color: rgb(212 212 235);
		}
		.tooltip {
			position: absolute;

			left: 0px;
			background-color: #243030;
			color: white;
			font-family: Verdana, Arial;
			font-size: 0.8em;
			border: solid 1px #ff6363;

			background-color: #E5E5FF;

			margin-bottom: 3px;
			font-family: Verdana, Arial;
			font-size: 12px;
		}
		#erase_region_cancel {
			display: block;
			text-decoration: underline;
			color: blue;
			text-align: center;

		#erase_region_cancel:active {

			margin-bottom: 3px;

			height: 32px;

			font-size: 28px;

			background-color: #CDCDFF;

		#text_deco_b {
			font-weight: bold;
		}
		#text_deco_i {
			font-style: italic;
		}
		#text_deco_u {
			text-decoration: underline;
		}
		#text_deco_s {
			text-decoration: line-through;
		}
		.menuPin {
			width: 12px;
			height: 12px;
		}
		.longpress-container {
			width: 100%;
			position: absolute;
			bottom: 22px;
			text-align: center;
			pointer-events: none;
		}
		.longpress-options {
			background-color: #E5E5FF;
			padding: 5px;
			display: inline-block;
			pointer-events: auto;
			cursor: default;
			user-select: none;
		}
		.longpress-option {
			display: table-cell;

		.longpress-option:active {
			background-color: #CDCDFF;

		/* LOGIN MODAL STYLES */
		#login_modal {
			position: fixed;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
			background-color: #E5E5FF;
			border: 2px solid #4444FF;
			border-radius: 8px;
			padding: 30px;
			box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
			z-index: 2000;
			min-width: 300px;
			font-family: Verdana, Arial;
		}
		#login_modal h2 {
			text-align: center;
			color: #333;
			margin-bottom: 20px;
			font-size: 18px;
		}
		.login_form_group {
			margin-bottom: 15px;
		}
		.login_form_group label {
			display: block;
			margin-bottom: 5px;
			color: #555;
			font-weight: bold;
			font-size: 12px;
		}
		.login_form_group input {
			width: 100%;
			padding: 8px;
			border: 1px solid #ccc;
			border-radius: 4px;
			font-family: Verdana, Arial;
			box-sizing: border-box;
			font-size: 12px;
		}
		.login_form_group input:focus {
			outline: none;
			border-color: #4444FF;
			background-color: #F5F5FF;
		}
		#login_button {
			width: 100%;
			padding: 10px;
			background-color: #4444FF;
			color: white;
			border: none;
			border-radius: 4px;
			cursor: pointer;
			font-weight: bold;
			font-family: Verdana, Arial;
			font-size: 12px;
			margin-bottom: 10px;
		}
		#login_button:hover {
			background-color: #3333DD;
		}
		#login_button:active {
			background-color: #2222BB;
		}
		#guest_button {
			width: 100%;
			padding: 10px;
			background-color: #888;
			color: white;
			border: none;
			border-radius: 4px;
			cursor: pointer;
			font-weight: bold;
			font-family: Verdana, Arial;
			font-size: 12px;
		}
		#guest_button:hover {
			background-color: #777;
		}
		.login_error {
			color: red;
			font-size: 12px;
			text-align: center;
			margin-bottom: 10px;
			display: none;
		}
		.login_success {
			color: green;
			font-size: 12px;
			text-align: center;
			margin-bottom: 10px;
			display: none;
		}

		/* USER STATUS PANEL */
		#user_status_panel {
			position: absolute;
			top: 5px;
			right: 5px;
			background-color: #E5E5FF;
			border: 1px solid #ccc;
			padding: 5px 10px;
			border-radius: 4px;
			font-family: Verdana, Arial;
			font-size: 11px;
			z-index: 99;

		.user_role {
			display: inline-block;

			border-radius: 3px;
			font-weight: bold;

		}

			background-color: #FF6B6B;
			color: white;
		}
		.user_role.owner {
			background-color: #FFD93D;
			color: #333;
		}
		.user_role.member {
			background-color: #6BCB77;
			color: white;
		}
		.user_role.public {
			background-color: #4D96FF;
			color: white;
		}
		#logout_button {
			padding: 3px 8px;
			background-color: #ccc;
			border: 1px solid #999;
			border-radius: 3px;
			cursor: pointer;
			font-size: 10px;
			margin-left: 5px;
		}
		#logout_button:hover {
			background-color: #bbb;

		/* SUBWORLD SELECTOR */
		#subworld_selector {
			position: absolute;
			top: 30px;
			right: 5px;
			background-color: #E5E5FF;

			border: 1px solid #ccc;
			border-radius: 3px;
			font-size: 10px;
		}

	<body>
		<div id="main_view">
			<canvas id="owot" class="screen_canvas" style="display: none;"></canvas>
		</div>

			<div id="link_div"></div>
		</a>
		<div id="topbar" class="ui">
			<div id="topbar_inner">
				<div id="announce_container"></div>
				<span id="menu" class="ui-vis tab menu" style="display: none;">
					<img src="https://halohash.github.io/worldofhash/static/pin.svg" class="menuPin" style="display: none;">
					<span class="menuText">Menu</span>
					<span style="font-size:50%">▼</span>
				</span>
			</div>
		</div>
		<div id="nav" class="ui menu ui-vis" style="display: none;">
			<ul></ul>
		</div>
		<div id="coords" class="ui ui-vis" style="display: none;">
			X: <span id="coord_X"></span>
			Y: <span id="coord_Y"></span>
			<div id="cursor_coords" style="display: none;">

		<script src="https://halohash.github.io/worldofhash/static/yw/javascript/permissions.js"></script>
		<script src="https://halohash.github.io/worldofhash/static/yw/javascript/chat.js"></script>

		<script>
			// ============================================
			// LOGIN & AUTHENTICATION SYSTEM
			// ============================================
			
			// User database (in production, this would be server-side)
			const USER_DATABASE = {
				'admin': {
					password: 'admin123',
					role: 'admin',
					permissions: ['read', 'write', 'delete', 'protect', 'manage_users']
				},
				'owner': {
					password: 'owner123',
					role: 'owner',
					permissions: ['read', 'write', 'delete', 'protect']
				},
				'member': {
					password: 'member123',
					role: 'member',
					permissions: ['read', 'write']
				},
				'public': {
					password: 'public123',
					role: 'public',
					permissions: ['read']
				}
			};

			// Current user session
			let currentUser = null;
			let currentSubworld = 'main';

			// Initialize app
			function initializeApp() {
				showLoginModal();
				setupEventListeners();
				loadUserSession();
			}

			function loadUserSession() {
				const savedUser = localStorage.getItem('braille_octant_user');
				const savedRole = localStorage.getItem('braille_octant_role');
				if (savedUser && savedRole) {
					currentUser = {
						username: savedUser,
						role: savedRole,
						authenticated: true
					};
					hideLoginModal();
					updateUserStatus();
					initializeSubworldSelector();
				}
			}

			function handleLogin(event) {
				event.preventDefault();
				const username = document.getElementById('username_input').value;
				const password = document.getElementById('password_input').value;
				const errorDiv = document.getElementById('login_error');
				const successDiv = document.getElementById('login_success');

				errorDiv.style.display = 'none';
				successDiv.style.display = 'none';

				// Validate credentials
				if (USER_DATABASE[username] && USER_DATABASE[username].password === password) {
					currentUser = {
						username: username,
						role: USER_DATABASE[username].role,
						permissions: USER_DATABASE[username].permissions,
						authenticated: true
					};

					// Save session
					localStorage.setItem('braille_octant_user', username);
					localStorage.setItem('braille_octant_role', USER_DATABASE[username].role);

					successDiv.textContent = 'Login successful! Redirecting...';
					successDiv.style.display = 'block';

					setTimeout(() => {
						hideLoginModal();
						updateUserStatus();
						initializeSubworldSelector();
					}, 1000);
				} else {
					errorDiv.textContent = 'Invalid username or password';
					errorDiv.style.display = 'block';
				}
			}

			function loginAsGuest() {
				currentUser = {
					username: 'Guest_' + Math.floor(Math.random() * 100000),
					role: 'public',
					permissions: ['read'],
					authenticated: false
				};

				localStorage.setItem('braille_octant_user', currentUser.username);
				localStorage.setItem('braille_octant_role', 'public');

				hideLoginModal();
				updateUserStatus();
				initializeSubworldSelector();
			}

			function showLoginModal() {
				document.getElementById('login_modal').style.display = 'block';
			}

			function hideLoginModal() {
				document.getElementById('login_modal').style.display = 'none';
			}

			function logout() {
				localStorage.removeItem('braille_octant_user');
				localStorage.removeItem('braille_octant_role');
				localStorage.removeItem('current_subworld');
				currentUser = null;
				currentSubworld = 'main';
				document.getElementById('user_status_panel').style.display = 'none';
				document.getElementById('subworld_selector').style.display = 'none';
				showLoginModal();
			}

			function updateUserStatus() {
				if (currentUser) {
					document.getElementById('user_status_panel').style.display = 'block';
					document.getElementById('username_display').textContent = currentUser.username;
					
					const roleDisplay = document.getElementById('user_role_display');
					roleDisplay.innerHTML = `<span class="user_role ${currentUser.role}">${currentUser.role.toUpperCase()}</span>`;
				}
			}

			// ============================================
			// ACCESS PROTECTION SYSTEM
			// ============================================

			function checkPermission(permission) {
				if (!currentUser) return false;
				return currentUser.permissions && currentUser.permissions.includes(permission);
			}

			function canRead() {
				return checkPermission('read');
			}

			function canWrite() {
				return checkPermission('write');
			}

			function canDelete() {
				return checkPermission('delete');
			}

			function canProtect() {
				return checkPermission('protect');
			}

			function canManageUsers() {
				return checkPermission('manage_users');
			}

			function getRoleLevel(role) {
				const levels = {
					'admin': 4,
					'owner': 3,
					'member': 2,
					'public': 1
				};
				return levels[role] || 0;
			}

			function isHigherRoleThan(userRole) {
				const currentLevel = getRoleLevel(currentUser?.role);
				const compareLevel = getRoleLevel(userRole);
				return currentLevel > compareLevel;
			}

			function protectArea(areaData, protectionLevel) {
				if (!canProtect()) {
					alert('You do not have permission to protect areas');
					return false;
				}

				// protectionLevel: 'public' (anyone), 'member', 'owner', 'admin'
				areaData.protection = {
					level: protectionLevel,
					protectedBy: currentUser.username,
					timestamp: new Date().toISOString()
				};
				return true;
			}

			// ============================================
			// SUBWORLD SYSTEM (INFINITE WORLDS)
			// ============================================

			const SUBWORLDS = {};

			function initializeSubworldSelector() {
				document.getElementById('subworld_selector').style.display = 'block';
				document.getElementById('subworld_join_btn').addEventListener('click', joinSubworld);
				document.getElementById('subworld_input').addEventListener('keypress', (e) => {
					if (e.key === 'Enter') joinSubworld();
				});
				loadSubworld('main');
			}

			function createSubworld(subworldId) {
				if (!SUBWORLDS[subworldId]) {
					SUBWORLDS[subworldId] = {
						id: subworldId,
						created: new Date().toISOString(),
						creator: currentUser.username,
						tiles: {},
						protections: {},
						members: [currentUser.username]
					};
					console.log(`Subworld created: ${subworldId}`);
				}
				return SUBWORLDS[subworldId];
			}

			function joinSubworld(subworldId) {
				subworldId = subworldId || document.getElementById('subworld_input').value.trim();
				
				if (!subworldId) {
					alert('Please enter a subworld ID');
					return;
				}

				// Create subworld if it doesn't exist
				if (!SUBWORLDS[subworldId]) {
					createSubworld(subworldId);
				}

				const subworld = SUBWORLDS[subworldId];

				// Check if user is allowed to join
				if (!canJoinSubworld(subworld)) {
					alert('You do not have permission to join this subworld');
					return;
				}

				// Add user to subworld members if not already there
				if (!subworld.members.includes(currentUser.username)) {
					subworld.members.push(currentUser.username);
				}

				loadSubworld(subworldId);
				document.getElementById('subworld_input').value = '';
			}

			function canJoinSubworld(subworld) {
				// Admins can always join
				if (currentUser.role === 'admin') return true;
				
				// If subworld has restrictions, check them
				if (subworld.restrictedTo) {
					return subworld.restrictedTo.includes(currentUser.role);
				}
				
				return true;
			}

			function loadSubworld(subworldId) {
				currentSubworld = subworldId;
				const subworld = SUBWORLDS[subworldId] || createSubworld(subworldId);
				
				localStorage.setItem('current_subworld', subworldId);
				document.getElementById('current_subworld').textContent = `Current: ${subworldId}`;

				console.log(`Loaded subworld: ${subworldId}`);
				console.log(`Members: ${subworld.members.join(', ')}`);

				// Update canvas title
				if (subworldId !== 'main') {
					document.title = `Braille Octant - Subworld: ${subworldId}`;
				} else {
					document.title = 'Braille Octant';
				}
			}

			function saveSubworldData(tileX, tileY, data) {
				if (!canWrite()) {
					console.warn('Write permission denied');
					return false;
				}

				const subworld = SUBWORLDS[currentSubworld];
				const tileKey = `${tileX},${tileY}`;

				// Check if area is protected
				if (isAreaProtected(tileX, tileY)) {
					if (!canUnprotectArea(tileX, tileY)) {
						console.warn('Area is protected and you cannot modify it');
						return false;
					}
				}

				subworld.tiles[tileKey] = {
					data: data,
					lastModified: new Date().toISOString(),
					modifiedBy: currentUser.username
				};

				return true;
			}

			function isAreaProtected(tileX, tileY) {
				const subworld = SUBWORLDS[currentSubworld];
				const tileKey = `${tileX},${tileY}`;
				return subworld.protections[tileKey] !== undefined;
			}

			function canUnprotectArea(tileX, tileY) {
				const subworld = SUBWORLDS[currentSubworld];
				const tileKey = `${tileX},${tileY}`;
				const protection = subworld.protections[tileKey];

				if (!protection) return true;

				// Owner of protection can always modify
				if (protection.protectedBy === currentUser.username) return true;

				// Admin can always modify
				if (currentUser.role === 'admin') return true;

				// Check role hierarchy
				const protectionLevel = protection.level;
				const userLevel = getRoleLevel(currentUser.role);
				const protectionLevelValue = getRoleLevel(protectionLevel);

				return userLevel > protectionLevelValue;
			}

			function listSubworlds() {
				return Object.keys(SUBWORLDS).map(id => ({
					id: id,
					created: SUBWORLDS[id].created,
					creator: SUBWORLDS[id].creator,
					members: SUBWORLDS[id].members.length
				}));
			}

			// ============================================
			// EVENT LISTENERS & INITIALIZATION
			// ============================================

			function setupEventListeners() {
				document.getElementById('logout_button').addEventListener('click', logout);
			}

			// Initialize everything when the page loads
			window.addEventListener('load', () => {
				initializeApp();
			});

			// Fallback for if page is already loaded
			if (document.readyState === 'complete' || document.readyState === 'interactive') {
				setTimeout(initializeApp, 100);
			}
		</script>
