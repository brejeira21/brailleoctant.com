var pendingTeleportCoords = null;

/**
 * Parse URL hash for coordinate-based teleportation
 * Supports formats like: /#10/#20 or /?x=10&y=20
 */
function parseURLCoordinates() {
	var hashMatch = window.location.hash.match(/#(-?\d+)\/#(-?\d+)/);
	var queryParams = new URLSearchParams(window.location.search);
	var xCoord, yCoord;
	
	// Try hash format: /#x/#y
	if (hashMatch) {
		xCoord = parseInt(hashMatch[1], 10);
		yCoord = parseInt(hashMatch[2], 10);
	}
	// Try query format: ?x=value&y=value
	else if (queryParams.has('x') && queryParams.has('y')) {
		xCoord = parseInt(queryParams.get('x'), 10);
		yCoord = parseInt(queryParams.get('y'), 10);
	}
	
	// If valid coordinates found, store for later teleportation
	if (xCoord !== undefined && yCoord !== undefined && !isNaN(xCoord) && !isNaN(yCoord)) {
		pendingTeleportCoords = [xCoord, yCoord];
		console.log('[Braille Octant] Teleport queued: X=' + xCoord + ', Y=' + yCoord);
	}
}

/**
 * Execute pending teleportation if coordinates are set
 * This should be called after the world is initialized
 */
function executePendingTeleport() {
	if (pendingTeleportCoords && typeof w !== 'undefined' && w.doGoToCoord) {
		var coords = pendingTeleportCoords;
		try {
			w.doGoToCoord(coords[0], coords[1]);
			console.log('[Braille Octant] Teleported to: X=' + coords[0] + ', Y=' + coords[1]);
		} catch (e) {
			console.error('[Braille Octant] Teleportation failed: ' + e.message);
		}
		pendingTeleportCoords = null;
	}
}

/**
 * Add menu option for seed-based teleportation
 * Uses cyrb128 hash function to convert text seeds to coordinates
 */
cyrb128 = function(t) {
	var e = 1779033703, i = 3144134277, l = 1013904242, a = 2773480762;
	for (var r, h = 0; h < t.length; h++) {
		r = t.charCodeAt(h);
		e = i ^ Math.imul(e ^ r, 597399067);
		i = l ^ Math.imul(i ^ r, 2869860233);
		l = a ^ Math.imul(l ^ r, 951274213);
		a = e ^ Math.imul(a ^ r, 2716044179);
	}
	e = Math.imul(l ^ e >>> 18, 597399067);
	i = Math.imul(a ^ i >>> 22, 2869860233);
	l = Math.imul(e ^ l >>> 17, 951274213);
	a = Math.imul(i ^ a >>> 19, 2716044179);
	return [(e ^ i ^ l ^ a) >>> 0, (i ^ e) >>> 0, (l ^ e) >>> 0, (a ^ e) >>> 0];
};

menu.addOption("Seed Teleport", function() {
	var seedInput = prompt("Enter seed text to teleport (or coordinates #x/#y):");
	if (!seedInput) return;
	
	// Check if input is coordinate format
	var coordMatch = seedInput.match(/^(-?\d+)\/(-?\d+)$/);
	var xCoord, yCoord;
	
	if (coordMatch) {
		// Direct coordinates
		xCoord = Math.round(parseInt(coordMatch[1], 10));
		yCoord = Math.round(parseInt(coordMatch[2], 10));
	} else {
		// Seed-based coordinates using cyrb128
		var seed = cyrb128(seedInput);
		xCoord = Math.round(seed[1] / (144 * 4 * 2));
		yCoord = Math.round(-seed[0] / (160 * 4 * 2));
	}
	
	if (!isNaN(xCoord) && !isNaN(yCoord)) {
		w.doGoToCoord(xCoord, yCoord);
		console.log('[Braille Octant] Teleported via seed to: X=' + xCoord + ', Y=' + yCoord);
		
		// Update URL without page reload
		var newHash = '/#' + xCoord + '/#' + yCoord;
		window.history.replaceState(null, null, newHash);
	} else {
		alert("Invalid coordinates or seed");
	}
});
